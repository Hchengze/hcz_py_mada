[pytest]
pythonpath = .
testpaths = tests
markers =
    original_madagascar: optional comparisons against original Madagascar sf* commands; skip when commands are not available.
    slow: tests that are intentionally slower than the default regression suite.
    hybrid: tests for optional C++/hybrid backends; pure Python fallback must remain valid.
    cli: tests that exercise command-line entry points or subprocess CLI behavior.
    prototype: tests for prototype or partial modules that are not stable Madagascar replacements.
