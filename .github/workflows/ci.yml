name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pure-python:
    name: Pure Python (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Show Python version
        run: python --version

      - name: Install pure-Python test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]" --no-build-isolation

      - name: Run pytest
        run: python -m pytest -q

      - name: Run release-light checks
        run: |
          python tools/check_release.py
          python tools/check_cli_inventory.py
          python tools/check_docs_commands.py
          python tools/check_examples_inventory.py
          python tools/check_mindmap.py
